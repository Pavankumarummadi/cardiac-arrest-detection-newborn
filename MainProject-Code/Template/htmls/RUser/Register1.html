<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>Register | Cardiac Arrest Detection</title>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
	<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
	<style>
		:root {
			--primary-brown: #5D4037;
			--secondary-brown: #8D6E63;
			--beige-bg: #FAF3E0;
			--beige-light: #FFF8E1;
			--accent-gold: #C6A664;
			--text-dark: #3E2723;
			--text-white: #FFFFFF;
			--shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
			--transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
		}

		body {
			background-image: url("{% static 'bg.jpg' %}");
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			background-attachment: fixed;
			font-family: 'Outfit', sans-serif;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dark);
			margin: 0;
			padding: 40px 0;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(30px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.register-container {
			max-width: 900px;
			width: 90%;
			background: rgba(255, 255, 255, 0.75);
			backdrop-filter: blur(10px);
			border-radius: 25px;
			padding: 35px;
			box-shadow: var(--shadow);
			border: 1px solid rgba(255, 255, 255, 0.4);
			animation: fadeIn 1s ease-out forwards;
		}

		#title {
			color: var(--primary-brown);
			font-weight: 700;
			margin-bottom: 15px;
			font-size: 1.6rem;
			line-height: 1.2;
		}

		.subtitle {
			color: var(--secondary-brown);
			font-size: 0.9rem;
			margin-bottom: 20px;
		}

		.register-image {
			width: 70%;
			margin: 0 auto;
			display: block;
			border-radius: 20px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
			transition: var(--transition);
			border: 4px solid rgba(255, 255, 255, 0.5);
		}

		.register-image:hover {
			transform: scale(1.02);
		}

		.form-group input {
			width: 100%;
			padding: 12px 18px;
			border-radius: 12px;
			border: 1px solid #D7CCC8;
			background: rgba(255, 255, 255, 0.9);
			transition: var(--transition);
			outline: none;
			font-size: 0.95rem;
		}

		.form-group input:focus {
			border-color: var(--accent-gold);
			box-shadow: 0 0 8px rgba(198, 166, 100, 0.2);
		}

		.btn-custom {
			background: var(--primary-brown);
			color: var(--text-white);
			border: none;
			padding: 14px 28px;
			border-radius: 12px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 1px;
			transition: var(--transition);
			width: 100%;
			cursor: pointer;
			box-shadow: 0 4px 15px rgba(93, 64, 55, 0.3);
		}

		.btn-custom:hover {
			background: var(--secondary-brown);
			transform: translateY(-5px);
			box-shadow: 0 8px 25px rgba(93, 64, 55, 0.4);
			color: white;
		}

		.btn-outline {
			background: transparent;
			color: var(--primary-brown);
			border: 2px solid var(--primary-brown);
			padding: 12px 20px;
			border-radius: 12px;
			font-weight: 600;
			transition: var(--transition);
			width: 100%;
			text-decoration: none;
			display: inline-block;
			margin-top: 15px;
			text-align: center;
		}

		.btn-outline:hover {
			background: var(--primary-brown);
			color: var(--text-white);
			transform: translateY(-3px);
			text-decoration: none;
		}

		.register-label {
			color: var(--primary-brown);
			font-weight: 700;
			margin-bottom: 20px;
			font-size: 1.2rem;
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		hr {
			border-top: 1px solid #D7CCC8;
			margin: 15px 0;
		}

		.form-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 15px;
		}
	</style>
</head>

<body>
	<div class="register-container">
		<h2 class="text-center" id="title">Create Your Account</h2>
		<p class="text-center subtitle">Early Detection Model for Cardiac Arrest in Newborns</p>
		<hr>
		<div class="row align-items-center">
			<div class="col-md-5 d-none d-md-block">
				<img src="{% static 'Register.jpg' %}" alt="Register Banner" class="register-image">
				<div class="mt-4">
					<p class="text-center" style="color: var(--secondary-brown); font-style: italic;">"Towards better
						healthcare through AI"</p>
				</div>
			</div>
			<div class="col-md-7">
				<form method="POST" role="form">
					{% csrf_token %}
					<p class="register-label">Registration Details</p>

					<div class="form-group">
						<input type="text" name="username" id="username" placeholder="Full Name" required>
					</div>

					<div class="form-grid">
						<div class="form-group">
							<input type="email" name="email" id="email" placeholder="Email Address" required>
						</div>
						<div class="form-group">
							<input type="password" name="password" id="password" placeholder="Password" required>
						</div>
					</div>

					<div class="form-grid">
						<div class="form-group">
							<input type="number" name="phoneno" id="phoneno" placeholder="Mobile Number" required>
						</div>
						<div class="form-group">
							<input type="text" name="country" id="country" placeholder="Country" required>
						</div>
					</div>

					<div class="form-grid">
						<div class="form-group">
							<input type="text" name="state" id="state" placeholder="State" required>
						</div>
						<div class="form-group">
							<input type="text" name="city" id="city" placeholder="City" required>
						</div>
					</div>

					<div class="mt-4">
						<button type="submit" class="btn-custom" name="submit">Sign Up</button>
					</div>
				</form>
				<div class="mt-3">
					<a href="{% url 'login' %}" class="btn-outline">Already have an account? Login</a>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
