{% extends 'RUser/design.html' %}
{% block userblock %}
<div class="content-card mx-auto" style="max-width: 600px;">
	<h2 class="register-label mb-4"
		style="color: var(--primary-brown); font-weight: 700; border-bottom: 2px solid var(--accent-gold); display: inline-block; padding-bottom: 5px;">
		Your Profile Information
	</h2>

	<div class="profile-details mt-4">
		<div class="profile-item mb-3 p-3"
			style="background: var(--beige-light); border-radius: 12px; transition: var(--transition); border-left: 4px solid var(--primary-brown);">
			<span
				style="color: var(--secondary-brown); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block;">Username</span>
			<span style="color: var(--text-dark); font-size: 1.2rem; font-weight: 700;">{{object.username}}</span>
		</div>

		<div class="profile-item mb-3 p-3"
			style="background: var(--beige-light); border-radius: 12px; transition: var(--transition); border-left: 4px solid var(--primary-brown);">
			<span
				style="color: var(--secondary-brown); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block;">Email
				Address</span>
			<span style="color: var(--text-dark); font-size: 1.1rem; font-weight: 600;">{{object.email}}</span>
		</div>

		<div class="profile-item mb-3 p-3"
			style="background: var(--beige-light); border-radius: 12px; transition: var(--transition); border-left: 4px solid var(--primary-brown);">
			<span
				style="color: var(--secondary-brown); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block;">Password</span>
			<span style="color: var(--text-dark); font-size: 1.1rem; font-weight: 600;">********</span>
		</div>

		<div class="row">
			<div class="col-md-6">
				<div class="profile-item mb-3 p-3"
					style="background: var(--beige-light); border-radius: 12px; transition: var(--transition); border-left: 4px solid var(--primary-brown);">
					<span
						style="color: var(--secondary-brown); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block;">Mobile
						No</span>
					<span style="color: var(--text-dark); font-weight: 600;">{{object.phoneno}}</span>
				</div>
			</div>
			<div class="col-md-6">
				<div class="profile-item mb-3 p-3"
					style="background: var(--beige-light); border-radius: 12px; transition: var(--transition); border-left: 4px solid var(--primary-brown);">
					<span
						style="color: var(--secondary-brown); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block;">Country</span>
					<span style="color: var(--text-dark); font-weight: 600;">{{object.country}}</span>
				</div>
			</div>
		</div>

		<div class="row">
			<div class="col-md-6">
				<div class="profile-item mb-3 p-3"
					style="background: var(--beige-light); border-radius: 12px; transition: var(--transition); border-left: 4px solid var(--primary-brown);">
					<span
						style="color: var(--secondary-brown); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block;">State</span>
					<span style="color: var(--text-dark); font-weight: 600;">{{object.state}}</span>
				</div>
			</div>
			<div class="col-md-6">
				<div class="profile-item mb-3 p-3"
					style="background: var(--beige-light); border-radius: 12px; transition: var(--transition); border-left: 4px solid var(--primary-brown);">
					<span
						style="color: var(--secondary-brown); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; display: block;">City</span>
					<span style="color: var(--text-dark); font-weight: 600;">{{object.city}}</span>
				</div>
			</div>
		</div>
	</div>
</div>

<style>
	.profile-item:hover {
		transform: translateX(10px);
		background: #fbfbfb !important;
		box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
	}

	.content-card {
		background: rgba(255, 255, 255, 0.9);
		backdrop-filter: blur(10px);
		border-radius: 20px;
		padding: 40px;
		box-shadow: var(--shadow);
		border: 1px solid rgba(255, 255, 255, 0.3);
		animation: fadeInUp 0.8s ease-out;
	}
</style>
{% endblock %}
