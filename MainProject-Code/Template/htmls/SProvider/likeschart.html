{% extends 'SProvider/design1.html' %}
{% block researchblock %}

<style>
     .chart-page-container {
          display: flex;
          justify-content: center;
          padding-top: 20px;
     }

     #chartContainer {
          width: 80%;
          height: 550px;
          background: rgba(255, 255, 255, 0.95);
          border-radius: 25px;
          padding: 25px;
          box-shadow: var(--shadow);
          border: 1px solid rgba(255, 255, 255, 0.5);
     }
</style>

<div class="chart-page-container">
     <div id="chartContainer"></div>
</div>

<script id="chart-data" type="application/json">
[
    {% for o in form %}
    {"y": {{ o.dcount }}, "label": "{{ o.names }}"}{% if not forloop.last %},{% endif %}
    {% endfor %}
]
</script>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
<script>
     window.onload = function () {
          let rawData = document.getElementById('chart-data').textContent;
          let dataPoints = [];
          try {
               dataPoints = JSON.parse(rawData);
          } catch (e) {
               dataPoints = [{ y: 0, label: "No Data Available" }];
          }

          if (dataPoints.length === 0) {
               dataPoints = [{ y: 0, label: "No Data Available" }];
          }

          var chart = new CanvasJS.Chart("chartContainer", {
               animationEnabled: true,
               theme: "light2",
               exportEnabled: true,
               title: {
                    text: "Model Performance Accuracy (Bar Chart)",
                    fontFamily: "Outfit",
                    fontWeight: "bold",
                    fontColor: "#5D4037",
                    padding: 20
               },
               subtitles: [{
                    text: "Comparative analysis of detection algorithms",
                    fontFamily: "Outfit",
                    fontColor: "#8D6E63"
               }],
               axisY: {
                    title: "Accuracy (%)",
                    includeZero: true,
                    suffix: "%",
                    gridColor: "#F3E5F5",
                    labelFontFamily: "Outfit"
               },
               axisX: {
                    labelFontFamily: "Outfit"
               },
               data: [{
                    type: "column",
                    yValueFormatString: "##0.00\"%\"",
                    indexLabel: "{y}",
                    indexLabelFontFamily: "Outfit",
                    indexLabelPlacement: "outside",
                    indexLabelFontWeight: "bold",
                    color: "#8D6E63",
                    dataPoints: dataPoints
               }]
          });
          chart.render();
     }
</script>

{% endblock %}
