{% extends 'SProvider/design1.html' %}
{% block researchblock %}

<style>
     .chart-page-container {
          display: flex;
          justify-content: center;
          padding-top: 20px;
     }

     #chartContainer {
          width: 90%;
          height: 600px;
          background: rgba(255, 255, 255, 0.95);
          border-radius: 35px;
          padding: 35px;
          box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
          border: 1px solid rgba(255, 255, 255, 0.6);
          animation: fadeInScale 1s ease-out;
     }

     @keyframes fadeInScale {
          from {
               opacity: 0;
               transform: scale(0.98);
          }

          to {
               opacity: 1;
               transform: scale(1);
          }
     }
</style>

<div class="chart-page-container">
     <div id="chartContainer"></div>
</div>

<script id="chart-data" type="application/json">
[
    {% for o in form %}
    {"y": {{ o.dcount }}, "label": "{{ o.names }}"}{% if not forloop.last %},{% endif %}
    {% endfor %}
]
</script>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
<script>
     window.onload = function () {
          let rawData = document.getElementById('chart-data').textContent;
          let dataPoints = [];
          try {
               dataPoints = JSON.parse(rawData);
          } catch (e) {
               dataPoints = [{ y: 0, label: "No Access Data" }];
          }

          if (dataPoints.length === 0) {
               dataPoints = [{ y: 0, label: "No Access Data" }];
          }

          CanvasJS.addColorSet("blueShades", ["#0B2447", "#19376D", "#576CBC", "#8491C3", "#A5D7E8"]);
          var chart = new CanvasJS.Chart("chartContainer", {
               animationEnabled: true,
               theme: "light1",
               exportEnabled: true,
               backgroundColor: "transparent",
               colorSet: "blueShades",
               padding: { left: 60, right: 30, top: 40, bottom: 20 },
               title: {
                    text: "Model Performance Accuracy (Bar Chart)",
                    fontFamily: "Outfit",
                    fontWeight: "800",
                    fontColor: "#0B2447",
                    padding: 30
               },
               subtitles: [{
                    text: "Comparative analysis of detection algorithms",
                    fontFamily: "Outfit",
                    fontColor: "#576CBC",
                    fontSize: 16
               }],
               axisY: {
                    title: "Accuracy (%)",
                    includeZero: true,
                    maximum: 110,
                    suffix: "%",
                    gridColor: "#E0E0E0",
                    labelFontFamily: "Outfit",
                    titleFontFamily: "Outfit",
                    titleFontWeight: "bold"
               },
               axisX: {
                    labelFontFamily: "Outfit",
                    labelFontWeight: "600",
                    labelAngle: 0,
                    labelMaxWidth: 80,
                    labelWrap: true,
                    labelFontSize: 12
               },
               data: [{
                    type: "column",
                    yValueFormatString: "##0.00\"%\"",
                    indexLabel: "{y}",
                    indexLabelFontFamily: "Outfit",
                    indexLabelPlacement: "outside",
                    indexLabelFontWeight: "bold",
                    indexLabelFontSize: 14,
                    indexLabelFontColor: "#0B2447",
                    dataPoints: dataPoints
               }]
          });
          chart.render();
     }
</script>

{% endblock %}
