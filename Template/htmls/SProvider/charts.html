{% extends 'SProvider/design1.html' %}
{% block researchblock %}

<style>
     .chart-page-container {
          display: flex;
          gap: 30px;
          align-items: flex-start;
          padding-top: 20px;
     }

     .chart-sidebar {
          flex: 0 0 300px;
          background: rgba(255, 255, 255, 0.9);
          padding: 35px;
          border-radius: 25px;
          box-shadow: var(--shadow);
          border: 1px solid var(--glass-border);
          backdrop-filter: blur(10px);
     }

     .chart-sidebar h3 {
          color: var(--primary-deep);
          font-weight: 700;
          font-size: 1.1rem;
          margin-bottom: 25px;
          border-left: 5px solid var(--accent-blue);
          padding-left: 15px;
          text-transform: uppercase;
          letter-spacing: 1.5px;
     }

     .chart-sidebar ul {
          list-style: none;
          padding: 0;
          margin: 0;
     }

     .chart-sidebar li {
          margin-bottom: 15px;
     }

     .chart-sidebar a {
          color: var(--primary-blue);
          text-decoration: none !important;
          font-weight: 600;
          transition: var(--transition);
          display: flex;
          align-items: center;
          padding: 14px 20px;
          border-radius: 15px;
          background: rgba(25, 55, 109, 0.05);
          border: 1px solid rgba(25, 55, 109, 0.1);
     }

     .chart-sidebar a:hover {
          background: var(--soft-blue);
          color: var(--primary-deep);
          transform: translateX(10px);
     }

     .chart-sidebar a.active {
          background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-deep) 100%);
          color: white;
          box-shadow: 0 8px 20px rgba(11, 36, 71, 0.3);
          border: none;
     }

     #chartContainer {
          flex: 1;
          height: 600px;
          background: rgba(255, 255, 255, 0.95);
          border-radius: 30px;
          padding: 30px;
          box-shadow: var(--shadow);
          border: 1px solid rgba(255, 255, 255, 0.6);
          animation: fadeInScale 1s ease-out;
     }
</style>

<div class="chart-page-container">
     <div class="chart-sidebar">
          <h3>Analysis Matrix</h3>
          <ul>
               <li><a href="{% url 'charts' 'pie' %}" class="{% if chart_type == 'pie' %}active{% endif %}"><i
                              class="fas fa-chart-pie mr-3"></i> Distribution Map</a></li>
               <li><a href="{% url 'charts' 'line' %}" class="{% if chart_type == 'line' %}active{% endif %}"><i
                              class="fas fa-chart-line mr-3"></i> Trend Projection</a></li>
               <li><a href="{% url 'charts' 'spline' %}" class="{% if chart_type == 'spline' %}active{% endif %}"><i
                              class="fas fa-chart-area mr-3"></i> Spline Intensity</a></li>
          </ul>
     </div>

     <div id="chartContainer"></div>
</div>

<script id="chart-data" type="application/json">
[
    {% for o in form %}
    {"y": {{ o.dcount }}, "label": "{{ o.names }}"}{% if not forloop.last %},{% endif %}
    {% endfor %}
]
</script>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
<script>
     window.onload = function () {
          let rawData = document.getElementById('chart-data').textContent;
          let dataPoints = [];
          try {
               dataPoints = JSON.parse(rawData);
          } catch (e) {
               dataPoints = [{ y: 0, label: "Null Vector" }];
          }

          if (dataPoints.length === 0) {
               dataPoints = [{ y: 0, label: "Null Vector" }];
          }

          CanvasJS.addColorSet("blueShades", ["#0B2447", "#19376D", "#576CBC", "#8491C3", "#A5D7E8"]);
          var chart = new CanvasJS.Chart("chartContainer", {
               animationEnabled: true,
               theme: "light1",
               exportEnabled: true,
               backgroundColor: "transparent",
               colorSet: "blueShades",
               padding: { left: 60, right: 30, top: 40, bottom: 20 },
               title: {
                    text: "{% if chart_type == 'line' %}Neural Arrest Projection{% elif chart_type == 'pie' %}Arrest Class Distribution{% else %}Arrest Intensity Spline{% endif %}",
                    fontFamily: "Outfit",
                    fontWeight: "700",
                    fontColor: "#0B2447",
                    padding: 30
               },
               subtitles: [{
                    text: "High-precision statistical probability for neonatal cardiac care",
                    fontFamily: "Outfit",
                    fontColor: "#19376D",
                    fontSize: 14
               }],
               axisY: {
                    title: "Probability Matrix (%)",
                    includeZero: true,
                    maximum: 110,
                    suffix: "%",
                    gridColor: "#E0E0E0",
                    labelFontFamily: "Outfit",
                    titleFontFamily: "Outfit",
                    titleFontWeight: "bold"
               },
               axisX: {
                    labelFontFamily: "Outfit",
                    labelAngle: 0,
                    labelFontWeight: "600",
                    labelMaxWidth: 80,
                    labelWrap: true,
                    labelFontSize: 12
               },
               data: [{
                    type: "{{ chart_type }}",
                    yValueFormatString: "##0.00\"%\"",
                    indexLabel: "{y}",
                    indexLabelFontFamily: "Outfit",
                    indexLabelFontWeight: "bold",
                    indexLabelPlacement: "outside",
                    indexLabelFontSize: 14,
                    indexLabelFontColor: "#0B2447",
                    markerSize: 12,
                    dataPoints: dataPoints
               }]
          });
          chart.render();
     }
</script>

{% endblock %}
